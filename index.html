<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VLM Comparison</title>

    <style>
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #0d0d0d;
        color: #e0e0e0;
      }
      .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100%;
        background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 100%);
      }
      .top-pane {
        flex: 1 1 50%;
        min-height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0a0a0a;
        overflow: hidden;
        border-bottom: 1px solid #2a2a2a;
      }
      #videoContainer {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #141414 0%, #0a0a0a 100%);
      }
      #videoFeed {
        display: block;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 4px;
      }
      #loadingOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        justify-content: center;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 10;
        color: #60a5fa;
        font-size: 1.2em;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      .resizer {
        height: 6px;
        background-color: #1e1e1e;
        cursor: ns-resize;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s ease;
        border-top: 1px solid #2a2a2a;
        border-bottom: 1px solid #2a2a2a;
      }
      .resizer:hover,
      .resizer.resizing {
        background-color: #2d2d2d;
      }
      .resizer::after {
        content: '';
        width: 48px;
        height: 3px;
        background: linear-gradient(90deg, transparent, #444, transparent);
        border-radius: 2px;
      }
      .resizer:hover::after,
      .resizer.resizing::after {
        background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      }
      .bottom-pane {
        flex: 1 1 50%;
        min-height: 150px;
        display: flex;
        flex-direction: column;
        background-color: #111111;
        overflow: hidden;
      }
      .instruction-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background-color: #161616;
        border-bottom: 1px solid #2a2a2a;
        flex-shrink: 0;
      }
      .instruction-row label {
        font-weight: 500;
        font-size: 13px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }
      #instructionText {
        flex: 1;
        padding: 10px 14px;
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        font-size: 14px;
        color: #e0e0e0;
        min-width: 0;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      #instructionText:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }
      #instructionText::placeholder {
        color: #555;
      }
      #intervalSelect,
      #modelSelect {
        padding: 10px 12px;
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        color: #e0e0e0;
        font-size: 13px;
        cursor: pointer;
        transition: border-color 0.2s ease;
      }
      #modelSelect {
        min-width: 180px;
      }
      #intervalSelect:hover,
      #modelSelect:hover {
        border-color: #3a3a3a;
      }
      #intervalSelect:focus,
      #modelSelect:focus {
        outline: none;
        border-color: #3b82f6;
      }
      #memoryWarning {
        color: #f59e0b;
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        background-color: rgba(245, 158, 11, 0.1);
        border-radius: 4px;
      }
      #memoryWarning.hidden {
        display: none;
      }
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .loading-model-name {
        font-weight: 600;
        font-size: 1.3em;
      }
      .loading-status {
        font-weight: 400;
        font-size: 1em;
        opacity: 0.8;
      }
      #startButton {
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        color: white;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.2s ease;
      }
      #startButton.start {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
      }
      #startButton.start:hover {
        background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        transform: translateY(-1px);
      }
      #startButton.stop {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
      }
      #startButton.stop:hover {
        background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.35);
        transform: translateY(-1px);
      }
      .response-section {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px 16px;
        min-height: 0;
      }
      .response-section label {
        font-weight: 500;
        font-size: 13px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 10px;
        flex-shrink: 0;
      }
      #responseText {
        flex: 1;
        width: 100%;
        padding: 14px;
        background-color: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        font-size: 14px;
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        color: #c0c0c0;
        resize: none;
        min-height: 0;
        line-height: 1.6;
      }
      #responseText:focus {
        outline: none;
        border-color: #3a3a3a;
      }
      #responseText::placeholder {
        color: #444;
      }
      .hidden {
        display: none;
      }
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }

      /* Video Source Controls */
      .video-source-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background-color: #161616;
        border-bottom: 1px solid #2a2a2a;
        flex-shrink: 0;
      }
      .video-source-btn {
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        background-color: #1a1a1a;
        color: #e0e0e0;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .video-source-btn:hover {
        border-color: #3a3a3a;
        background-color: #222;
      }
      .video-source-btn.active {
        border-color: #3b82f6;
        background-color: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }
      .video-source-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .video-source-btn.recording {
        border-color: #ef4444;
        background-color: rgba(239, 68, 68, 0.15);
        color: #f87171;
        animation: pulse-recording 1.5s infinite;
      }
      @keyframes pulse-recording {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      /* Recording Indicator */
      .recording-indicator {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        background-color: rgba(0, 0, 0, 0.75);
        border-radius: 4px;
        z-index: 5;
      }
      .recording-indicator.hidden {
        display: none;
      }
      .recording-dot {
        width: 10px;
        height: 10px;
        background-color: #ef4444;
        border-radius: 50%;
        animation: pulse-dot 1s infinite;
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.9); }
      }
      .recording-text {
        font-size: 12px;
        font-weight: 600;
        color: #ef4444;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Mode Toggle */
      .mode-toggle {
        display: flex;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .mode-toggle-option {
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        background-color: #1a1a1a;
        color: #888;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .mode-toggle-option:first-child {
        border-right: 1px solid #2a2a2a;
      }
      .mode-toggle-option:hover {
        background-color: #222;
        color: #e0e0e0;
      }
      .mode-toggle-option.active {
        background-color: #3b82f6;
        color: white;
      }

      /* Benchmark Panel */
      .benchmark-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px 16px;
        background-color: #161616;
        border-bottom: 1px solid #2a2a2a;
        flex-shrink: 0;
      }
      .benchmark-panel.hidden {
        display: none;
      }
      .benchmark-row {
        display: flex;
        align-items: flex-start;
        gap: 16px;
      }
      .benchmark-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .benchmark-section-label {
        font-weight: 500;
        font-size: 11px;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .model-checklist {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-height: 120px;
        overflow-y: auto;
        padding: 8px;
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        min-width: 400px;
      }
      .model-checkbox-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        background-color: #222;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s ease;
        white-space: nowrap;
      }
      .model-checkbox-item:hover {
        background-color: #2a2a2a;
      }
      .model-checkbox-item input[type="checkbox"] {
        cursor: pointer;
        accent-color: #3b82f6;
      }
      .model-checkbox-item label {
        font-size: 12px;
        color: #c0c0c0;
        cursor: pointer;
      }
      .model-checkbox-item .vram-hint {
        font-size: 10px;
        color: #666;
      }
      .select-all-btn {
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        background-color: #1a1a1a;
        color: #888;
        transition: all 0.2s ease;
      }
      .select-all-btn:hover {
        border-color: #3a3a3a;
        color: #e0e0e0;
      }

      /* Benchmark Progress */
      .benchmark-progress-container {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
      }
      .benchmark-progress-container.hidden {
        display: none;
      }
      .benchmark-progress-bar {
        height: 6px;
        background-color: #2a2a2a;
        border-radius: 3px;
        overflow: hidden;
      }
      .benchmark-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 3px;
        transition: width 0.3s ease;
        width: 0%;
      }
      .benchmark-progress-text {
        font-size: 12px;
        color: #888;
      }
      .benchmark-progress-text .model-name {
        color: #60a5fa;
        font-weight: 500;
      }

      /* Benchmark Actions */
      .benchmark-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .benchmark-btn {
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.2s ease;
      }
      .benchmark-btn.run {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
      }
      .benchmark-btn.run:hover:not(:disabled) {
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        transform: translateY(-1px);
      }
      .benchmark-btn.run:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .benchmark-btn.cancel {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
      }
      .benchmark-btn.cancel:hover {
        background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      }
      .benchmark-btn.cancel.hidden {
        display: none;
      }

      /* Results Container */
      .results-container {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .results-container.hidden {
        display: none;
      }
      .results-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background-color: #161616;
        border-bottom: 1px solid #2a2a2a;
        flex-shrink: 0;
      }
      .results-video-preview {
        width: 200px;
        height: 120px;
        background-color: #0a0a0a;
        border-radius: 4px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .results-video-preview video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .results-video-controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .results-video-time {
        font-size: 14px;
        font-family: 'SF Mono', monospace;
        color: #e0e0e0;
      }
      .results-video-scrubber {
        width: 200px;
        cursor: pointer;
        accent-color: #3b82f6;
      }

      /* Results Table */
      .results-table-container {
        flex: 1;
        overflow: auto;
        min-height: 0;
      }
      .results-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .results-table th {
        position: sticky;
        top: 0;
        background-color: #1a1a1a;
        padding: 10px 12px;
        text-align: left;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
        border-bottom: 1px solid #2a2a2a;
        z-index: 1;
      }
      .results-table th:first-child {
        position: sticky;
        left: 0;
        z-index: 2;
        background-color: #1a1a1a;
      }
      .results-table td {
        padding: 10px 12px;
        border-bottom: 1px solid #1e1e1e;
        color: #c0c0c0;
        max-width: 250px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        vertical-align: top;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }
      .results-table td:first-child {
        position: sticky;
        left: 0;
        background-color: #111;
        font-family: 'SF Mono', monospace;
        color: #888;
        font-size: 12px;
        white-space: nowrap;
        cursor: default;
      }
      .results-table tr:hover td {
        background-color: #1a1a1a;
      }
      .results-table tr:hover td:first-child {
        background-color: #1a1a1a;
      }
      .results-table tr.highlighted td {
        background-color: rgba(59, 130, 246, 0.15);
      }
      .results-table tr.highlighted td:first-child {
        background-color: rgba(59, 130, 246, 0.15);
      }
      .results-table td:hover:not(:first-child) {
        background-color: #222;
      }
      .latency-badge {
        font-size: 10px;
        color: #666;
        margin-left: 6px;
      }

      /* Cell Expand Modal */
      .cell-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
      }
      .cell-modal-overlay.hidden {
        display: none;
      }
      .cell-modal {
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        max-width: 600px;
        max-height: 80vh;
        width: 90%;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      .cell-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid #2a2a2a;
      }
      .cell-modal-title {
        font-weight: 600;
        color: #e0e0e0;
      }
      .cell-modal-meta {
        font-size: 12px;
        color: #888;
      }
      .cell-modal-close {
        background: none;
        border: none;
        color: #888;
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        transition: color 0.2s ease;
      }
      .cell-modal-close:hover {
        color: #e0e0e0;
      }
      .cell-modal-content {
        padding: 16px;
        overflow-y: auto;
        flex: 1;
        font-size: 14px;
        line-height: 1.6;
        color: #c0c0c0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* Export Controls */
      .export-controls {
        display: flex;
        gap: 8px;
        padding: 10px 12px;
        background-color: #161616;
        border-top: 1px solid #2a2a2a;
        flex-shrink: 0;
      }
      .export-btn {
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        background-color: #1a1a1a;
        color: #e0e0e0;
        transition: all 0.2s ease;
      }
      .export-btn:hover {
        border-color: #3a3a3a;
        background-color: #222;
      }
      .export-btn.clear {
        margin-left: auto;
        color: #f87171;
        border-color: rgba(239, 68, 68, 0.3);
      }
      .export-btn.clear:hover {
        background-color: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.5);
      }

      /* Live mode controls visibility */
      .live-mode-controls.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Video Source Controls -->
      <div class="video-source-controls">
        <button id="uploadVideoBtn" class="video-source-btn">Upload Video</button>
        <button id="screenShareBtn" class="video-source-btn">Screen Share</button>
        <button id="recordBtn" class="video-source-btn" disabled>Record</button>
        <input type="file" id="videoFileInput" accept="video/*" class="hidden" />
        <span id="videoSourceStatus" style="font-size: 12px; color: #666; margin-left: 8px;"></span>
      </div>

      <div class="top-pane" id="topPane">
        <div id="videoContainer">
          <video id="videoFeed" autoplay playsinline></video>
          <!-- Recording Indicator -->
          <div id="recordingIndicator" class="recording-indicator hidden">
            <div class="recording-dot"></div>
            <span class="recording-text">REC</span>
          </div>
          <div id="loadingOverlay">
            <div class="loading-content">
              <span id="loadingModelName" class="loading-model-name"></span>
              <span id="loadingStatus" class="loading-status">Loading...</span>
            </div>
          </div>
        </div>
      </div>
      <canvas id="canvas" class="hidden"></canvas>

      <div class="resizer" id="resizer"></div>

      <div class="bottom-pane" id="bottomPane">
        <!-- Mode Toggle Row -->
        <div class="instruction-row" style="gap: 16px;">
          <div class="mode-toggle">
            <button id="liveModeBtn" class="mode-toggle-option active">Live</button>
            <button id="benchmarkModeBtn" class="mode-toggle-option">Benchmark</button>
          </div>

          <!-- Live Mode Controls -->
          <div id="liveModeControls" class="live-mode-controls" style="display: flex; align-items: center; gap: 12px; flex: 1;">
            <label for="modelSelect">Model:</label>
            <select id="modelSelect" name="Model">
              <option value="smolvlm-256m">SmolVLM 256M (Fast)</option>
              <option value="florence2-base-pretrain">Florence-2 Base PT (Microsoft)</option>
              <option value="florence2-base">Florence-2 Base FT (Microsoft)</option>
              <option value="fastvlm-05b">FastVLM 0.5B (Apple)</option>
              <option value="smolvlm-500m" selected>SmolVLM 500M (Balanced)</option>
              <option value="janus-pro-1b">Janus-Pro 1B (DeepSeek)</option>
              <option value="florence2-large">Florence-2 Large (Microsoft)</option>

      const video = document.getElementById("videoFeed");
      const canvas = document.getElementById("canvas");

      const bottomPane = document.getElementById("bottomPane");

      const memoryWarning = document.getElementById("memoryWarning");

      const loadingStatus = document.getElementById("loadingStatus");

      instructionText.value = "What do you see?"; // default instruction

      // Model state variables
      let currentModelKey = null;
      let selectedModelKey = "smolvlm-500m";

      // Benchmark state variables
      let appMode = "live"; // "live" or "benchmark"
      let videoSource = "none"; // "none", "upload", "screenshare", "recording"
      let uploadedVideoBlob = null;
      let recordedVideoBlob = null;
      let mediaRecorder = null;
      let recordingChunks = [];
      let isRecording = false;
      let benchmarkSession = null;

      // Resizer functionality
      let isResizing = false;

      resizer.addEventListener("mousedown", (e) => {
        isResizing = true;
        resizer.classList.add("resizing");
        document.body.style.cursor = "ns-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;

        const containerRect = document.querySelector(".app-container").getBoundingClientRect();
        const containerHeight = containerRect.height;
        const resizerHeight = resizer.offsetHeight;
        const mouseY = e.clientY - containerRect.top;

        const minTopHeight = 100;
        const minBottomHeight = 150;
        const maxTopHeight = containerHeight - minBottomHeight - resizerHeight;

        let newTopHeight = Math.max(minTopHeight, Math.min(mouseY, maxTopHeight));

        topPane.style.flex = "none";
        topPane.style.height = newTopHeight + "px";
        bottomPane.style.flex = "1";
      });

      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          resizer.classList.remove("resizing");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
        }
      });

      let stream;
      let isProcessing = false;

      let processor, model, tokenizer;

      // Helper function to get model configuration
      function getModelConfig(modelKey) {
        return MODEL_CONFIGS[modelKey];
      }

      // Update memory warning visibility based on model
      function updateMemoryWarning(modelKey) {
        const config = getModelConfig(modelKey);
        if (config && config.showWarning) {
          memoryWarning.innerHTML = `&#9888; High VRAM (${config.vramEstimate})`;
          memoryWarning.classList.remove("hidden");
        } else {
          memoryWarning.classList.add("hidden");
        }
      }

      // Update recommended settings based on model
      function updateRecommendedSettings(modelKey) {
        const config = getModelConfig(modelKey);
        if (config) {
          intervalSelect.value = config.suggestedInterval;
        }
      }

      // Dispose current model to free memory
      function disposeCurrentModel() {
        processor = null;
        model = null;
        tokenizer = null;
        currentModelKey = null;
        // Hint garbage collection (not guaranteed but helps)
        if (typeof gc === "function") {
          gc();
        }
      }

      // Initialize model with configuration
      async function initModel(modelKey) {
        const config = getModelConfig(modelKey);
        if (!config) {
          responseText.value = `Error: Unknown model key "${modelKey}"`;
          return;
        }

        loadingOverlay.style.display = "flex";
        loadingModelName.textContent = config.displayName;
        loadingStatus.textContent = "Loading processor...";
        responseText.value = `Loading ${config.displayName}...`;

        try {
          // Load processor
          processor = await AutoProcessor.from_pretrained(config.modelId);
          loadingStatus.textContent = "Processor loaded. Loading model...";
          responseText.value = `${config.displayName}: Processor loaded. Loading model...`;

          // Load tokenizer if required (e.g., Moondream)
          if (config.requiresTokenizer) {
            loadingStatus.textContent = "Loading tokenizer...";
            tokenizer = await AutoTokenizer.from_pretrained(config.modelId);
            loadingStatus.textContent = "Tokenizer loaded. Loading model...";
          } else {
            tokenizer = null;
          }

          // Load model based on model class
          if (config.modelClass === "AutoModelForImageTextToText") {
            model = await AutoModelForImageTextToText.from_pretrained(config.modelId, {
              dtype: config.dtype,
              device: "webgpu",
            });
          } else if (config.modelClass === "Qwen2VLForConditionalGeneration") {
            model = await Qwen2VLForConditionalGeneration.from_pretrained(config.modelId, {
              dtype: config.dtype,
              device: "webgpu",
            });
          } else if (config.modelClass === "Florence2ForConditionalGeneration") {
            model = await Florence2ForConditionalGeneration.from_pretrained(config.modelId, {
              dtype: config.dtype,
              device: "webgpu",
            });
          } else if (config.modelClass === "PaliGemmaForConditionalGeneration") {
            model = await PaliGemmaForConditionalGeneration.from_pretrained(config.modelId, {
              dtype: config.dtype,
              device: "webgpu",
            });
          } else if (config.modelClass === "Moondream1ForConditionalGeneration") {
            model = await Moondream1ForConditionalGeneration.from_pretrained(config.modelId, {
              dtype: config.dtype,
              device: "webgpu",
            });
          } else if (config.modelClass === "MultiModalityCausalLM") {
            model = await MultiModalityCausalLM.from_pretrained(config.modelId, {
              dtype: config.dtype,
              device: "webgpu",
            });
          } else {
            // Default to AutoModelForVision2Seq
            model = await AutoModelForVision2Seq.from_pretrained(config.modelId, {
              dtype: config.dtype,
              device: "webgpu",
            });
          }

          currentModelKey = modelKey;
          loadingStatus.textContent = "Model loaded!";
          responseText.value = `${config.displayName} loaded. Initializing screen share...`;
          loadingOverlay.style.display = "none";
        } catch (error) {
          console.error("Error loading model:", error);
          loadingOverlay.style.display = "none";
          currentModelKey = null;
          
          // Check for memory-related errors
          if (error.message && (error.message.includes("memory") || error.message.includes("OOM"))) {
            responseText.value = `Error: Out of GPU memory loading ${config.displayName}. Try a smaller model like SmolVLM 256M.`;
            alert(`Out of GPU memory. Try selecting a smaller model like SmolVLM 256M (Fast).`);
          } else {
            responseText.value = `Error loading ${config.displayName}: ${error.message}`;
          }
        }
      }

      // Handle model selection change
      async function handleModelChange() {
        const newModelKey = modelSelect.value;
        
        // If same model, do nothing
        if (newModelKey === currentModelKey) {
          return;
        }

        // If processing, prevent model change
        if (isProcessing) {
          alert("Please stop processing before switching models.");
          modelSelect.value = currentModelKey || selectedModelKey;
          return;
        }

        // Update UI
        updateMemoryWarning(newModelKey);
        updateRecommendedSettings(newModelKey);
        selectedModelKey = newModelKey;

        // Dispose current model and load new one
        disposeCurrentModel();
        await initModel(newModelKey);

        // Re-initialize screen share if not active
        if (!stream) {
          await initScreenShare();
        }
      }

      async function initScreenShare() {
        try {
          stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
          });
          video.srcObject = stream;
          responseText.value = "Screen sharing started. Ready to process.";
        } catch (err) {
          console.error("Error starting screen share:", err);
          responseText.value = `Error starting screen share: ${err.name} - ${err.message}. You may have cancelled the picker or are not on HTTPS/localhost.`;
          alert(
            `Error starting screen share: ${err.name}. You may have cancelled the picker or need to be on HTTPS/localhost.`
          );
        }
      }

      function captureImage() {
        if (!stream || !video.videoWidth) {
          console.warn("Video stream not ready for capture.");
          return null;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const frame = context.getImageData(0, 0, canvas.width, canvas.height);
        return new RawImage(frame.data, frame.width, frame.height, 4);
      }

      // Helper function to resize RawImage to target dimensions
      async function resizeImage(rawImage, targetSize) {
        if (!targetSize) return rawImage;
        return await rawImage.resize(targetSize, targetSize);
      }

      async function runLocalVisionInference(imgElement, instruction) {
        const config = getModelConfig(currentModelKey);
        const maxTokens = config ? config.maxTokens : 100;
        const processorType = config ? config.processorType : "smolvlm";

        let messages, text, inputs;
        let processedImage = imgElement;

        // Resize image if model requires specific dimensions
        if (config && config.imageSize) {
          processedImage = await resizeImage(imgElement, config.imageSize);
        }

        if (processorType === "fastvlm") {
          // FastVLM: inline <image> token, image-first processor call
          messages = [
            {
              role: "user",
              content: "<image>" + instruction,
            },
          ];
          text = processor.apply_chat_template(messages, {
            add_generation_prompt: true,
          });
          inputs = await processor(processedImage, text, {
            add_special_tokens: false,
          });
        } else if (processorType === "qwen2vl") {
          // Qwen2-VL: structured content array, similar to SmolVLM
          messages = [
            {
              role: "user",
              content: [{ type: "image" }, { type: "text", text: instruction }],
            },
          ];
          text = processor.apply_chat_template(messages, {
            add_generation_prompt: true,
          });
          inputs = await processor(text, processedImage, {
            add_special_tokens: false,
          });
        } else if (processorType === "florence") {
          // Florence-2: task prefix prompts, no chat template
          // Use defaultPrompt from config or map instruction to task
          let taskPrompt = config.defaultPrompt || "<MORE_DETAILED_CAPTION>";
          
          // Allow user to override with specific task prefixes
          if (instruction.startsWith("<")) {
            taskPrompt = instruction;
          }
          
          inputs = await processor(processedImage, taskPrompt);
        } else if (processorType === "paligemma") {
          // PaliGemma: space-prefixed text prompt, no chat template
          const prompt = " " + instruction;
          inputs = await processor(processedImage, prompt);
        } else if (processorType === "moondream") {
          // Moondream: uses separate tokenizer, special prompt format
          const prompt = `<<image>>\n\nQuestion: ${instruction}\n\nAnswer:`;
          const text_inputs = tokenizer(prompt);
          const vision_inputs = await processor(processedImage);
          inputs = { ...text_inputs, ...vision_inputs };
        } else if (processorType === "janus") {
          // Janus: uses special role format with image placeholder
          const conversation = [
            {
              role: "<|User|>",
              content: `<<image_placeholder>>\n${instruction}`,
              images: [processedImage],
            },
          ];
          inputs = await processor(conversation);
        } else if (processorType === "phi3v") {
          // Phi-3 Vision: uses chat template with image placeholder
          messages = [
            {
              role: "user",
              content: [{ type: "image" }, { type: "text", text: instruction }],
            },
          ];
          text = processor.apply_chat_template(messages, {
            add_generation_prompt: true,
          });
          inputs = await processor(text, processedImage);
        } else {
          // SmolVLM: structured content array, text-first processor call
          messages = [
            {
              role: "user",
              content: [{ type: "image" }, { type: "text", text: instruction }],
            },
          ];
          text = processor.apply_chat_template(messages, {
            add_generation_prompt: true,
          });
          inputs = await processor(text, [processedImage], {
            do_image_splitting: false,
          });
        }

        const generatedIds = await model.generate({
          ...inputs,
          max_new_tokens: maxTokens,
        });
        const output = processor.batch_decode(
          generatedIds.slice(null, [inputs.input_ids.dims.at(-1), null]),
          { skip_special_tokens: true }
        );
        return output[0].trim();
      }

      async function sendData() {
        if (!isProcessing) return;
        const instruction = instructionText.value;
        const rawImg = captureImage();
        if (!rawImg) {
          responseText.value = "Capture failed";
          return;
        }
        try {
          const reply = await runLocalVisionInference(rawImg, instruction);
          responseText.value = reply;
        } catch (e) {
          console.error(e);
          responseText.value = `Error: ${e.message}`;
        }
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function processingLoop() {
        const intervalMs = parseInt(intervalSelect.value, 10);
        while (isProcessing) {
          await sendData();
          if (!isProcessing) break;
          await sleep(intervalMs);
        }
      }

      function handleStart() {
        if (!stream) {
          responseText.value = "Screen share not available. Cannot start.";
          alert("Screen share not active. Please start screen sharing first.");
          return;
        }
        if (!currentModelKey) {
          responseText.value = "Model not loaded. Please wait for model to load.";
          alert("Model not loaded yet. Please wait or select a model.");
          return;
        }
        isProcessing = true;
        startButton.textContent = "Stop";
        startButton.classList.replace("start", "stop");

        instructionText.disabled = true;
        intervalSelect.disabled = true;
        modelSelect.disabled = true;

        responseText.value = "Processing started...";

        processingLoop();
      }

      function handleStop() {
        isProcessing = false;
        startButton.textContent = "Start";
        startButton.classList.replace("stop", "start");

        instructionText.disabled = false;
        intervalSelect.disabled = false;
        modelSelect.disabled = false;
        
        if (responseText.value.startsWith("Processing started...")) {
          responseText.value = "Processing stopped.";
        }
      }

      // ========== VIDEO SOURCE FUNCTIONS ==========

      // Handle video file upload
      function handleVideoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Validate file type
        if (!file.type.startsWith("video/")) {
          alert("Please select a valid video file.");
          return;
        }

        uploadedVideoBlob = file;
        const objectURL = URL.createObjectURL(file);
        
        // Set video source
        video.srcObject = null;
        video.src = objectURL;
        video.muted = true;
        video.loop = true;
        video.play();

        videoSource = "upload";
        updateVideoSourceUI();
        validateBenchmarkReady();

        document.getElementById("videoSourceStatus").textContent = `Loaded: ${file.name}`;
      }

      // Handle screen share
      async function handleScreenShareBtn() {
        try {
          // Stop any existing stream
          if (stream) {
            stream.getTracks().forEach(track => track.stop());
          }

          stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
          });
          
          video.srcObject = stream;
          video.src = "";
          videoSource = "screenshare";
          updateVideoSourceUI();
          
          // Enable record button
          document.getElementById("recordBtn").disabled = false;
          document.getElementById("videoSourceStatus").textContent = "Screen sharing active";

          // Load model if not loaded (for live mode)
          if (!currentModelKey && appMode === "live") {
            await initModel(selectedModelKey);
          }

          // Handle stream end
          stream.getVideoTracks()[0].onended = () => {
            videoSource = "none";
            stream = null;
            updateVideoSourceUI();
            document.getElementById("recordBtn").disabled = true;
            document.getElementById("videoSourceStatus").textContent = "";
          };
        } catch (err) {
          console.error("Error starting screen share:", err);
          alert(`Error starting screen share: ${err.name}. You may have cancelled the picker.`);
        }
      }

      // Start recording screen share
      function startRecording() {
        if (!stream) {
          alert("Please start screen sharing first.");
          return;
        }

        recordingChunks = [];
        mediaRecorder = new MediaRecorder(stream, {
          mimeType: "video/webm;codecs=vp9"
        });

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            recordingChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          recordedVideoBlob = new Blob(recordingChunks, { type: "video/webm" });
          const objectURL = URL.createObjectURL(recordedVideoBlob);
          
          // Stop screen share
          if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
          }

          // Set recorded video as source
          video.srcObject = null;
          video.src = objectURL;
          video.muted = true;
          video.loop = true;
          video.play();

          videoSource = "recording";
          isRecording = false;
          updateVideoSourceUI();
          validateBenchmarkReady();

          document.getElementById("recordBtn").disabled = true;
          document.getElementById("videoSourceStatus").textContent = "Recording saved";
        };

        mediaRecorder.start(1000); // Collect data every second
        isRecording = true;
        updateVideoSourceUI();
        document.getElementById("videoSourceStatus").textContent = "Recording...";
      }

      // Stop recording
      function stopRecording() {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
          mediaRecorder.stop();
        }
        document.getElementById("recordingIndicator").classList.add("hidden");
      }

      // Update video source button states
      function updateVideoSourceUI() {
        const uploadBtn = document.getElementById("uploadVideoBtn");
        const screenShareBtn = document.getElementById("screenShareBtn");
        const recordBtn = document.getElementById("recordBtn");
        const recordingIndicator = document.getElementById("recordingIndicator");

        // Reset all buttons
        uploadBtn.classList.remove("active");
        screenShareBtn.classList.remove("active", "recording");
        recordBtn.classList.remove("recording");

        if (videoSource === "upload") {
          uploadBtn.classList.add("active");
        } else if (videoSource === "screenshare") {
          screenShareBtn.classList.add("active");
          if (isRecording) {
            recordBtn.classList.add("recording");
            recordBtn.textContent = "Stop Recording";
            recordingIndicator.classList.remove("hidden");
          } else {
            recordBtn.textContent = "Record";
            recordingIndicator.classList.add("hidden");
          }
        } else if (videoSource === "recording") {
          recordBtn.classList.add("active");
          recordingIndicator.classList.add("hidden");
        } else {
          recordingIndicator.classList.add("hidden");
        }
      }

      // ========== MODE TOGGLE FUNCTIONS ==========

      function toggleMode(newMode) {
        if (appMode === newMode) return;
        
        // Don't allow mode switch during processing
        if (isProcessing) {
          alert("Please stop processing before switching modes.");
          return;
        }
        if (benchmarkSession && benchmarkSession.status === "running") {
          alert("Please wait for or cancel the benchmark before switching modes.");
          return;
        }

        appMode = newMode;
        
        const liveModeBtn = document.getElementById("liveModeBtn");
        const benchmarkModeBtn = document.getElementById("benchmarkModeBtn");
        const liveModeControls = document.getElementById("liveModeControls");
        const benchmarkPanel = document.getElementById("benchmarkPanel");
        const responseSection = document.getElementById("responseSection");
        const resultsContainer = document.getElementById("resultsContainer");

        if (appMode === "live") {
          liveModeBtn.classList.add("active");
          benchmarkModeBtn.classList.remove("active");
          liveModeControls.classList.remove("hidden");
          benchmarkPanel.classList.add("hidden");
          responseSection.classList.remove("hidden");
          resultsContainer.classList.add("hidden");
        } else {
          liveModeBtn.classList.remove("active");
          benchmarkModeBtn.classList.add("active");
          liveModeControls.classList.add("hidden");
          benchmarkPanel.classList.remove("hidden");
          responseSection.classList.add("hidden");
          // Show results if we have them
          if (benchmarkSession && benchmarkSession.results && benchmarkSession.results.length > 0) {
            resultsContainer.classList.remove("hidden");
          }
        }

        validateBenchmarkReady();
      }

      // ========== BENCHMARK FUNCTIONS ==========

      // Populate model checklist
      function updateModelChecklist() {
        const checklist = document.getElementById("modelChecklist");
        checklist.innerHTML = "";

        for (const [key, config] of Object.entries(MODEL_CONFIGS)) {
          const item = document.createElement("div");
          item.className = "model-checkbox-item";
          item.innerHTML = `
            <input type="checkbox" id="model-${key}" value="${key}" />
            <label for="model-${key}">${config.displayName}</label>
            <span class="vram-hint">${config.vramEstimate}</span>
          `;
          checklist.appendChild(item);
        }
      }

      // Toggle select all models
      function toggleSelectAllModels() {
        const checkboxes = document.querySelectorAll("#modelChecklist input[type='checkbox']");
        const allChecked = Array.from(checkboxes).every(cb => cb.checked);
        
        checkboxes.forEach(cb => {
          cb.checked = !allChecked;
        });

        document.getElementById("selectAllModelsBtn").textContent = allChecked ? "Select All" : "Deselect All";
        validateBenchmarkReady();
      }

      // Get selected models
      function getSelectedModels() {
        const checkboxes = document.querySelectorAll("#modelChecklist input[type='checkbox']:checked");
        return Array.from(checkboxes).map(cb => cb.value);
      }

      // Validate if benchmark can be run
      function validateBenchmarkReady() {
        const runBtn = document.getElementById("runBenchmarkBtn");
        const hasVideo = videoSource === "upload" || videoSource === "recording";
        const hasModels = getSelectedModels().length > 0;
        
        runBtn.disabled = !(hasVideo && hasModels);
      }

      // Generate UUID
      function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }

      // Initialize benchmark session
      function initBenchmarkSession() {
        const selectedModels = getSelectedModels();
        const instruction = document.getElementById("benchmarkInstruction").value || "What do you see?";
        const intervalMs = parseInt(document.getElementById("benchmarkInterval").value, 10);
        const videoDuration = video.duration || 0;
        const totalFrames = Math.ceil(videoDuration / (intervalMs / 1000));

        benchmarkSession = {
          id: generateUUID(),
          createdAt: Date.now(),
          videoSource: videoSource,
          videoDuration: videoDuration,
          frameInterval: intervalMs,
          totalFrames: totalFrames,
          instruction: instruction,
          models: selectedModels,
          status: "idle",
          currentModelIndex: 0,
          currentFrameIndex: 0,
          results: selectedModels.map(modelKey => ({
            modelKey: modelKey,
            modelDisplayName: MODEL_CONFIGS[modelKey].displayName,
            status: "pending",
            startTime: null,
            endTime: null,
            totalLatencyMs: 0,
            entries: []
          }))
        };

        return benchmarkSession;
      }

      // Run benchmark
      async function runBenchmark() {
        // Validate
        const hasVideo = videoSource === "upload" || videoSource === "recording";
        if (!hasVideo) {
          alert("Please upload a video or record screen share first.");
          return;
        }

        const selectedModels = getSelectedModels();
        if (selectedModels.length === 0) {
          alert("Please select at least one model to benchmark.");
          return;
        }

        // Wait for video metadata if needed
        if (!video.duration || isNaN(video.duration)) {
          await new Promise(resolve => {
            video.onloadedmetadata = resolve;
            setTimeout(resolve, 1000); // Timeout fallback
          });
        }

        // Initialize session
        initBenchmarkSession();
        benchmarkSession.status = "running";

        // Update UI
        document.getElementById("runBenchmarkBtn").classList.add("hidden");
        document.getElementById("cancelBenchmarkBtn").classList.remove("hidden");
        document.getElementById("benchmarkProgressContainer").classList.remove("hidden");
        document.getElementById("modelChecklist").style.pointerEvents = "none";
        document.getElementById("benchmarkInstruction").disabled = true;
        document.getElementById("benchmarkInterval").disabled = true;

        // Pause video
        video.pause();
        video.currentTime = 0;

        try {
          await processBenchmarkSequentially();
        } catch (error) {
          console.error("Benchmark error:", error);
          benchmarkSession.status = "failed";
        }

        // Re-enable UI
        document.getElementById("runBenchmarkBtn").classList.remove("hidden");
        document.getElementById("cancelBenchmarkBtn").classList.add("hidden");
        document.getElementById("modelChecklist").style.pointerEvents = "auto";
        document.getElementById("benchmarkInstruction").disabled = false;
        document.getElementById("benchmarkInterval").disabled = false;

        if (benchmarkSession.status === "completed" || benchmarkSession.status === "cancelled") {
          renderResultsTable();
          document.getElementById("resultsContainer").classList.remove("hidden");
        }
      }

      // Process benchmark sequentially through models
      async function processBenchmarkSequentially() {
        const progressFill = document.getElementById("benchmarkProgressFill");
        const progressText = document.getElementById("benchmarkProgressText");

        for (let i = 0; i < benchmarkSession.models.length; i++) {
          if (benchmarkSession.status === "cancelled") break;

          benchmarkSession.currentModelIndex = i;
          const modelKey = benchmarkSession.models[i];
          const modelResult = benchmarkSession.results[i];
          const config = MODEL_CONFIGS[modelKey];

          progressText.innerHTML = `Loading <span class="model-name">${config.displayName}</span>...`;

          // Dispose current model and load new one
          disposeCurrentModel();
          
          try {
            await initModel(modelKey);
            modelResult.status = "running";
            modelResult.startTime = Date.now();

            await processVideoForModel(modelKey, i);

            modelResult.endTime = Date.now();
            modelResult.status = "completed";
          } catch (error) {
            console.error(`Error with model ${modelKey}:`, error);
            modelResult.status = "failed";
            modelResult.entries.push({
              frameIndex: -1,
              error: error.message
            });
          }

          // Update overall progress
          const overallProgress = ((i + 1) / benchmarkSession.models.length) * 100;
          progressFill.style.width = `${overallProgress}%`;
        }

        if (benchmarkSession.status !== "cancelled") {
          benchmarkSession.status = "completed";
        }

        progressText.textContent = benchmarkSession.status === "cancelled" 
          ? "Benchmark cancelled" 
          : "Benchmark completed!";
      }

      // Process video for a single model
      async function processVideoForModel(modelKey, modelIndex) {
        const progressText = document.getElementById("benchmarkProgressText");
        const config = MODEL_CONFIGS[modelKey];
        const intervalMs = benchmarkSession.frameInterval;
        const modelResult = benchmarkSession.results[modelIndex];

        // Calculate frame times
        const frameTimes = [];
        for (let t = 0; t < benchmarkSession.videoDuration; t += intervalMs / 1000) {
          frameTimes.push(t);
        }

        for (let frameIdx = 0; frameIdx < frameTimes.length; frameIdx++) {
          if (benchmarkSession.status === "cancelled") break;

          benchmarkSession.currentFrameIndex = frameIdx;
          const frameTime = frameTimes[frameIdx];

          progressText.innerHTML = `Processing <span class="model-name">${config.displayName}</span> - Frame ${frameIdx + 1} of ${frameTimes.length}`;

          // Seek video to frame time
          video.currentTime = frameTime;
          await new Promise(resolve => {
            const onSeeked = () => {
              video.removeEventListener("seeked", onSeeked);
              resolve();
            };
            video.addEventListener("seeked", onSeeked);
            // Fallback timeout
            setTimeout(resolve, 500);
          });

          // Capture frame
          const captureTimestamp = Date.now();
          const rawImg = captureImageFromVideo(video);
          
          if (!rawImg) {
            modelResult.entries.push({
              frameIndex: frameIdx,
              frameTimeSeconds: frameTime,
              captureTimestamp: captureTimestamp,
              text: "",
              error: "Frame capture failed",
              latencyMs: 0
            });
            continue;
          }

          // Run inference
          const inferenceStart = Date.now();
          let text = "";
          let error = null;

          try {
            text = await runLocalVisionInference(rawImg, benchmarkSession.instruction);
          } catch (e) {
            console.error(`Inference error at frame ${frameIdx}:`, e);
            error = e.message;
          }

          const inferenceEnd = Date.now();
          const latencyMs = inferenceEnd - inferenceStart;

          modelResult.entries.push({
            frameIndex: frameIdx,
            frameTimeSeconds: frameTime,
            captureTimestamp: captureTimestamp,
            inferenceStartTimestamp: inferenceStart,
            inferenceEndTimestamp: inferenceEnd,
            latencyMs: latencyMs,
            text: text,
            error: error
          });

          modelResult.totalLatencyMs += latencyMs;
        }
      }

      // Capture image from video element (works for both stream and file)
      function captureImageFromVideo(videoEl) {
        if (!videoEl.videoWidth || !videoEl.videoHeight) {
          console.warn("Video not ready for capture.");
          return null;
        }
        canvas.width = videoEl.videoWidth;
        canvas.height = videoEl.videoHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        const frame = context.getImageData(0, 0, canvas.width, canvas.height);
        return new RawImage(frame.data, frame.width, frame.height, 4);
      }

      // Cancel benchmark
      function cancelBenchmark() {
        if (benchmarkSession) {
          benchmarkSession.status = "cancelled";
        }
      }

      // ========== RESULTS DISPLAY FUNCTIONS ==========

      // Format time as MM:SS
      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      }

      // Render results table
      function renderResultsTable() {
        if (!benchmarkSession || !benchmarkSession.results) return;

        const headerRow = document.getElementById("resultsTableHeader");
        const tableBody = document.getElementById("resultsTableBody");
        const resultsVideo = document.getElementById("resultsVideo");

        // Set up results video
        if (videoSource === "upload" && uploadedVideoBlob) {
          resultsVideo.src = URL.createObjectURL(uploadedVideoBlob);
        } else if (videoSource === "recording" && recordedVideoBlob) {
          resultsVideo.src = URL.createObjectURL(recordedVideoBlob);
        }

        // Update summary
        document.getElementById("summaryModelCount").textContent = benchmarkSession.results.length;
        document.getElementById("summaryFrameCount").textContent = benchmarkSession.totalFrames;

        // Build header
        headerRow.innerHTML = "<th>Time</th>";
        benchmarkSession.results.forEach(result => {
          const th = document.createElement("th");
          th.textContent = result.modelDisplayName;
          headerRow.appendChild(th);
        });

        // Build rows
        tableBody.innerHTML = "";
        
        // Find max frames across all models
        const maxFrames = Math.max(...benchmarkSession.results.map(r => r.entries.length));

        for (let frameIdx = 0; frameIdx < maxFrames; frameIdx++) {
          const tr = document.createElement("tr");
          tr.dataset.frameIndex = frameIdx;

          // Get frame time from first model that has this frame
          let frameTime = 0;
          for (const result of benchmarkSession.results) {
            if (result.entries[frameIdx]) {
              frameTime = result.entries[frameIdx].frameTimeSeconds;
              break;
            }
          }

          // Time cell
          const timeTd = document.createElement("td");
          timeTd.textContent = formatTime(frameTime);
          timeTd.dataset.frameTime = frameTime;
          tr.appendChild(timeTd);

          // Model cells
          benchmarkSession.results.forEach((result, modelIdx) => {
            const td = document.createElement("td");
            const entry = result.entries[frameIdx];
            
            if (entry) {
              if (entry.error) {
                td.textContent = `Error: ${entry.error}`;
                td.style.color = "#f87171";
              } else {
                td.textContent = entry.text || "-";
                const latencyBadge = document.createElement("span");
                latencyBadge.className = "latency-badge";
                latencyBadge.textContent = `${entry.latencyMs}ms`;
                td.appendChild(latencyBadge);
              }
              
              td.dataset.modelIndex = modelIdx;
              td.dataset.frameIndex = frameIdx;
              td.addEventListener("click", () => expandCellContent(modelIdx, frameIdx));
            } else {
              td.textContent = "-";
            }
            
            tr.appendChild(td);
          });

          tableBody.appendChild(tr);
        }

        // Set up video sync
        setupVideoSync();
      }

      // Set up video synchronization with table
      function setupVideoSync() {
        const resultsVideo = document.getElementById("resultsVideo");
        const scrubber = document.getElementById("resultsVideoScrubber");
        const timeDisplay = document.getElementById("resultsVideoTime");
        const playPauseBtn = document.getElementById("resultsPlayPauseBtn");

        resultsVideo.onloadedmetadata = () => {
          scrubber.max = resultsVideo.duration;
          timeDisplay.textContent = `0:00 / ${formatTime(resultsVideo.duration)}`;
        };

        resultsVideo.ontimeupdate = () => {
          scrubber.value = resultsVideo.currentTime;
          timeDisplay.textContent = `${formatTime(resultsVideo.currentTime)} / ${formatTime(resultsVideo.duration)}`;
          syncVideoToTable();
        };

        scrubber.oninput = () => {
          resultsVideo.currentTime = scrubber.value;
        };

        playPauseBtn.onclick = () => {
          if (resultsVideo.paused) {
            resultsVideo.play();
            playPauseBtn.textContent = "Pause";
          } else {
            resultsVideo.pause();
            playPauseBtn.textContent = "Play";
          }
        };
      }

      // Sync video position to table highlight
      function syncVideoToTable() {
        const resultsVideo = document.getElementById("resultsVideo");
        const currentTime = resultsVideo.currentTime;
        const rows = document.querySelectorAll("#resultsTableBody tr");

        // Remove existing highlights
        rows.forEach(row => row.classList.remove("highlighted"));

        // Find and highlight the current row
        let closestRow = null;
        let closestDiff = Infinity;

        rows.forEach(row => {
          const frameTime = parseFloat(row.querySelector("td").dataset.frameTime);
          const diff = Math.abs(currentTime - frameTime);
          if (diff < closestDiff && currentTime >= frameTime) {
            closestDiff = diff;
            closestRow = row;
          }
        });

        if (closestRow) {
          closestRow.classList.add("highlighted");
          // Scroll into view if needed
          closestRow.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }

      // Sync table click to video position
      function syncTableToVideo(frameTime) {
        const resultsVideo = document.getElementById("resultsVideo");
        resultsVideo.currentTime = frameTime;
      }

      // Expand cell content in modal
      function expandCellContent(modelIndex, frameIndex) {
        const result = benchmarkSession.results[modelIndex];
        const entry = result.entries[frameIndex];
        
        if (!entry) return;

        const modal = document.getElementById("cellModal");
        const title = document.getElementById("cellModalTitle");
        const meta = document.getElementById("cellModalMeta");
        const content = document.getElementById("cellModalContent");

        title.textContent = result.modelDisplayName;
        meta.textContent = `Frame ${frameIndex + 1} at ${formatTime(entry.frameTimeSeconds)} • ${entry.latencyMs}ms latency`;
        content.textContent = entry.error ? `Error: ${entry.error}` : entry.text;

        modal.classList.remove("hidden");
      }

      // Close cell modal
      function closeCellModal() {
        document.getElementById("cellModal").classList.add("hidden");
      }

      // ========== EXPORT FUNCTIONS ==========

      // Export to JSON
      function exportToJSON() {
        if (!benchmarkSession) return;

        const json = JSON.stringify(benchmarkSession, null, 2);
        const blob = new Blob([json], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement("a");
        a.href = url;
        a.download = `benchmark-${benchmarkSession.id}-${Date.now()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // Export to CSV
      function exportToCSV() {
        if (!benchmarkSession) return;

        const rows = [
          ["frame_index", "frame_time_seconds", "model_key", "model_name", "text", "latency_ms", "error"]
        ];

        benchmarkSession.results.forEach(result => {
          result.entries.forEach(entry => {
            rows.push([
              entry.frameIndex,
              entry.frameTimeSeconds,
              result.modelKey,
              result.modelDisplayName,
              `"${(entry.text || "").replace(/"/g, '""')}"`,
              entry.latencyMs,
              entry.error || ""
            ]);
          });
        });

        const csv = rows.map(row => row.join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement("a");
        a.href = url;
        a.download = `benchmark-${benchmarkSession.id}-${Date.now()}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // Clear benchmark results
      function clearBenchmarkResults() {
        benchmarkSession = null;
        document.getElementById("resultsContainer").classList.add("hidden");
        document.getElementById("resultsTableBody").innerHTML = "";
        document.getElementById("benchmarkProgressContainer").classList.add("hidden");
        document.getElementById("benchmarkProgressFill").style.width = "0%";
        document.getElementById("benchmarkProgressText").textContent = "Preparing benchmark...";
      }

      startButton.addEventListener("click", () => {
        if (isProcessing) {
          handleStop();
        } else {
          handleStart();
        }
      });

      // Model selector change event listener
      modelSelect.addEventListener("change", handleModelChange);

      // ========== VIDEO SOURCE EVENT LISTENERS ==========
      
      document.getElementById("videoFileInput").addEventListener("change", handleVideoUpload);
      
      document.getElementById("uploadVideoBtn").addEventListener("click", () => {
        document.getElementById("videoFileInput").click();
      });
      
      document.getElementById("screenShareBtn").addEventListener("click", handleScreenShareBtn);
      
      document.getElementById("recordBtn").addEventListener("click", () => {
        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      });

      // ========== MODE TOGGLE EVENT LISTENERS ==========
      
      document.getElementById("liveModeBtn").addEventListener("click", () => toggleMode("live"));
      document.getElementById("benchmarkModeBtn").addEventListener("click", () => toggleMode("benchmark"));

      // ========== BENCHMARK EVENT LISTENERS ==========
      
      document.getElementById("selectAllModelsBtn").addEventListener("click", toggleSelectAllModels);
      
      document.getElementById("modelChecklist").addEventListener("change", validateBenchmarkReady);
      
      document.getElementById("runBenchmarkBtn").addEventListener("click", runBenchmark);
      
      document.getElementById("cancelBenchmarkBtn").addEventListener("click", cancelBenchmark);

      // ========== RESULTS EVENT LISTENERS ==========
      
      document.getElementById("exportJSONBtn").addEventListener("click", exportToJSON);
      
      document.getElementById("exportCSVBtn").addEventListener("click", exportToCSV);
      
      document.getElementById("clearResultsBtn").addEventListener("click", clearBenchmarkResults);
      
      document.getElementById("cellModalClose").addEventListener("click", closeCellModal);
      
      document.getElementById("cellModal").addEventListener("click", (e) => {
        if (e.target.id === "cellModal") {
          closeCellModal();
        }
      });

      // Table row time cell click to sync video
      document.getElementById("resultsTableBody").addEventListener("click", (e) => {
        const td = e.target.closest("td:first-child");
        if (td && td.dataset.frameTime !== undefined) {
          syncTableToVideo(parseFloat(td.dataset.frameTime));
        }
      });

      window.addEventListener("DOMContentLoaded", async () => {
        // Check for WebGPU support
        if (!navigator.gpu) {
          const videoElement = document.getElementById("videoFeed");
          const warningElement = document.createElement("p");
          warningElement.textContent =
            "WebGPU is not available in this browser.";
          warningElement.style.color = "red";
          warningElement.style.textAlign = "center";
          videoElement.parentNode.insertBefore(
            warningElement,
            videoElement.nextSibling
          );
        }

        // Initialize model checklist for benchmark mode
        updateModelChecklist();

        // Get initial model selection from dropdown
        selectedModelKey = modelSelect.value;
        
        // Update memory warning for initial selection
        updateMemoryWarning(selectedModelKey);

        // Set default mode to live
        appMode = "live";
        
        // Don't auto-load model or screen share - wait for user action
        document.getElementById("videoSourceStatus").textContent = "Select a video source to begin";
      });

      window.addEventListener("beforeunload", () => {
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
        }
      });
    </script>
  </body>
</html>
